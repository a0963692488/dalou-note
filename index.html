<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>RB 大樓雲端筆記</title>
<style>
:root {
  --bg:#050507; --panel:#111114; --card:#1c1c1f; --card2:#242428; --text:#f5f5f7;
  --muted:#a1a1aa; --line:#33333a; --blue:#0a84ff; --green:#34c759; --red:#ff453a;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",Arial,sans-serif}
button,input,textarea{font-family:inherit}
.app{max-width:900px;margin:0 auto;padding:18px 14px 46px}
.top{position:sticky;top:0;z-index:10;background:linear-gradient(180deg,var(--bg) 88%,rgba(5,5,7,0));padding:12px 0 16px}
.row{display:flex;gap:10px;align-items:center}
h1{font-size:30px;margin:0 0 12px;font-weight:950}
.search{flex:1;min-width:0;padding:15px 16px;border-radius:16px;border:1px solid var(--line);background:var(--card);color:var(--text);font-size:17px;outline:none}
.btn{border:0;border-radius:15px;min-height:50px;padding:0 18px;font-size:17px;font-weight:900;cursor:pointer;color:white;background:var(--card2);text-decoration:none;display:flex;align-items:center;justify-content:center}
.btn.blue{background:var(--blue)} .btn.green{background:var(--green)} .btn.red{background:var(--red)}
.status{color:var(--muted);font-size:14px;margin-top:10px}
.list{display:grid;gap:12px;margin-top:16px}
.item{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:18px;cursor:pointer}
.item:hover{border-color:#666}
.name{font-size:23px;font-weight:950}
.meta{font-size:15px;color:var(--muted);margin-top:7px;word-break:break-all}
.detail{display:none}
.back{display:inline-block;color:var(--blue);font-size:18px;text-decoration:none;margin:6px 0 18px;cursor:pointer}
.hero{display:flex;align-items:center;gap:14px;margin-bottom:10px}
.icon{font-size:42px} h2{font-size:34px;margin:0;font-weight:950}
.card{background:var(--card);border:1px solid var(--line);border-radius:24px;padding:18px;margin-top:14px}
label{display:block;color:#d4d4d8;font-size:16px;font-weight:900;margin:0 0 8px}
.field{width:100%;padding:15px 16px;border-radius:16px;border:1px solid #3a3a42;background:#111113;color:var(--text);font-size:18px;outline:none;margin-bottom:16px}
textarea.field{min-height:260px;resize:vertical;line-height:1.55}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:4px}
.small{font-size:14px;color:var(--muted);margin-top:10px;min-height:18px}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:99;align-items:flex-end;justify-content:center;padding:14px}
.modalBox{width:min(680px,100%);max-height:88vh;overflow:auto;background:var(--panel);border:1px solid var(--line);border-radius:24px;padding:18px}
.modalTitle{font-size:24px;font-weight:950;margin:0 0 14px}
.empty{text-align:center;color:var(--muted);padding:42px}
.hubPage{display:none}
.hubList{display:grid;gap:12px;margin-top:12px}
.hubCard{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:15px}
.hubTitle{font-size:21px;font-weight:950;margin-bottom:8px}
.ports{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.port{min-width:48px;height:44px;border-radius:12px;border:1px solid #444;background:#111;color:#fff;font-weight:900;font-size:16px}
.port.used{background:#0b3b1a;border-color:#34c759}
.port.bad{background:#471313;border-color:#ff453a}
.port.backup{background:#483a00;border-color:#ffd60a}
.btn.orange{background:#ff9f0a}
@media(max-width:560px){
  h1{font-size:28px} h2{font-size:30px} .actions{grid-template-columns:1fr} .btn{min-height:56px} textarea.field{min-height:300px}
}
</style>
</head>
<body>
<div class="app">
  <section id="home">
    <div class="top">
      <h1>🏢 RB 大樓雲端筆記</h1>
      <div class="row">
        <input id="search" class="search" placeholder="搜尋大樓或網址..." />
        <button class="btn blue" id="addBtn">＋新增</button>
      </div>
      <div id="status" class="status">雲端連線中...</div>
    </div>
    <div id="list" class="list"></div>
  </section>

  <section id="detail" class="detail">
    <a id="back" class="back">‹ 返回大樓列表</a>
    <div class="hero"><div class="icon">🏢</div><h2 id="dTitle"></h2></div>
    <div id="dUrl" class="meta"></div>

    <div class="card">
      <label>大樓名稱</label>
      <input id="fName" class="field">

      <label>RB 網址</label>
      <input id="fUrl" class="field">

      <label>備註</label>
      <textarea id="fNote" class="field" placeholder="輸入注意事項、設備位置、登入提醒、處理紀錄..."></textarea>

      <div class="actions">
        <button class="btn green" id="saveBtn">立即儲存</button>
        <a class="btn blue" id="rbBtn" target="_blank" rel="noopener">進入 RB</a>
        <button class="btn orange" id="hubBtn">HUB</button>
      </div>
      <div id="saveState" class="small"></div>
      <div id="lastUpdate" class="small"></div>
    </div>
  </section>

  <section id="hubPage" class="hubPage">
    <a id="hubBack" class="back">‹ 返回大樓資料</a>
    <div class="hero"><div class="icon">🔌</div><h2 id="hubTitle">HUB</h2></div>
    <div class="meta">記錄幾棟、幾號、幾樓、孔位用途</div>
    <div class="card">
      <label>棟別</label>
      <input id="hBlock" class="field" placeholder="A棟">
      <label>號碼 / 樓層</label>
      <input id="hLocation" class="field" placeholder="33號7F">
      <label>孔數</label>
      <input id="hCount" class="field" type="number" value="4" min="1" max="48">
      <button class="btn orange" id="addHubBtn">＋新增 HUB</button>
      <div id="hubSaveState" class="small"></div>
    </div>
    <div id="hubList" class="hubList"></div>
  </section>
</div>

<div id="modal" class="modal">
  <div class="modalBox">
    <h3 class="modalTitle">新增大樓</h3>
    <label>大樓名稱</label>
    <input id="mName" class="field">
    <label>RB 網址</label>
    <input id="mUrl" class="field" placeholder="http://...:9000">
    <div class="actions">
      <button class="btn blue" id="modalSave">新增</button>
      <button class="btn" id="modalCancel">取消</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getFirestore, collection, doc, setDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD3vNxPvIjTRdZj5Puu8KYtejKMv0C66jI",
  authDomain: "rb-note.firebaseapp.com",
  projectId: "rb-note",
  storageBucket: "rb-note.firebasestorage.app",
  messagingSenderId: "193771549362",
  appId: "1:193771549362:web:b539bfb17165d15aa7cfab"
};

const DEFAULT_BUILDINGS = [{"name": "林森166", "url": "http://122.117.133.121:9000", "note": ""}, {"name": "皇苑創世紀", "url": "http://59.127.165.196:9000", "note": ""}, {"name": "京城四季", "url": "http://122.117.195.122:9000", "note": ""}, {"name": "太普D&G", "url": "http://114.35.241.10:9000", "note": ""}, {"name": "河畔Happy", "url": "http://122.117.213.110:9000", "note": ""}, {"name": "遠東新公園", "url": "http://114.35.212.96:9000", "note": ""}, {"name": "明水漾", "url": "http://211.72.60.223:9000", "note": ""}, {"name": "Happy 悅讀", "url": "http://122.117.49.23:9000", "note": ""}, {"name": "交響苑", "url": "http://125.227.231.51:9000", "note": ""}, {"name": "兩廳院", "url": "http://211.20.234.174:9000", "note": ""}, {"name": "國城MRT", "url": "http://220.135.131.212:9000", "note": ""}, {"name": "尊峰", "url": "http://218.161.115.236:9000", "note": ""}, {"name": "快可易", "url": "http://220.133.228.150:9000", "note": ""}, {"name": "棋琴11重奏", "url": "http://59.127.177.112:9000", "note": ""}, {"name": "棋琴20重奏_1", "url": "http://122.117.49.117:9000", "note": ""}, {"name": "棋琴20重奏_2", "url": "http://114.35.201.236:9000", "note": ""}, {"name": "浪漫滿屋", "url": "http://122.117.57.131:9000", "note": ""}, {"name": "芳崗澄品", "url": "http://211.72.60.37:9000", "note": ""}, {"name": "爵美大樓", "url": "http://220.135.240.236:9000", "note": ""}, {"name": "小王子", "url": "http://122.117.49.10:9000", "note": ""}, {"name": "中正大樓", "url": "http://59.127.179.135:9000", "note": ""}, {"name": "水森林", "url": "http://220.130.243.157:9000", "note": ""}, {"name": "水舞間", "url": "http://59.127.228.73:9000", "note": ""}, {"name": "世紀星鑽一心", "url": "http://59.127.178.41:9000", "note": ""}, {"name": "世紀星鑽河北", "url": "http://114.35.240.146:9000", "note": ""}, {"name": "合群孝區", "url": "http://59.127.193.48:9000", "note": ""}, {"name": "百達富御", "url": "http://122.117.49.69:9000", "note": ""}, {"name": "城中星", "url": "http://122.117.230.146:9000", "note": ""}, {"name": "香頌", "url": "http://122.117.49.229:9000", "note": ""}, {"name": "Hi 協勝發", "url": "http://220.132.27.42:9000", "note": ""}, {"name": "J時尚", "url": "http://220.134.182.61:9000", "note": ""}, {"name": "MINE MINE", "url": "http://220.133.182.70:9000", "note": ""}, {"name": "Super One", "url": "http://122.117.49.242:9000", "note": ""}, {"name": "亞大樓", "url": "http://220.134.164.211:9000", "note": ""}, {"name": "冠藝大樓", "url": "http://211.72.60.229:9000", "note": ""}, {"name": "吉松頂園", "url": "http://220.134.182.97:9000", "note": ""}, {"name": "堅山三川", "url": "http://59.127.165.155:9000", "note": ""}, {"name": "太普上新光", "url": "http://125.229.27.45:9000", "note": ""}, {"name": "悅讀天詩", "url": "http://122.117.213.130:9000", "note": ""}, {"name": "悅讀泰郡", "url": "http://220.132.27.170:9000", "note": ""}, {"name": "捷仕堡", "url": "http://220.134.242.140:9000", "note": ""}, {"name": "捷運樓", "url": "http://122.117.49.52:9000", "note": ""}, {"name": "文山.C", "url": "http://220.134.242.126:9000", "note": ""}, {"name": "文蓮苑", "url": "http://122.117.195.13:9000", "note": ""}, {"name": "文賢苑", "url": "http://114.35.240.239:9000", "note": ""}, {"name": "日森大地", "url": "http://220.132.27.128:9000", "note": ""}, {"name": "未來玩城市", "url": "http://59.127.166.55:9000", "note": ""}, {"name": "沐提斯", "url": "http://59.127.135.3:9000", "note": ""}, {"name": "河歌山", "url": "http://122.117.49.24:9000", "note": ""}, {"name": "流行城市", "url": "http://59.127.190.217:9000", "note": ""}, {"name": "海科棧", "url": "http://220.133.182.137:9000", "note": ""}, {"name": "溫莎堡", "url": "http://220.135.131.72:9000", "note": ""}, {"name": "獅甲國宅", "url": "http://59.125.159.177:9000", "note": ""}, {"name": "祥城", "url": "http://114.35.240.155:9000", "note": ""}, {"name": "築夢世紀", "url": "http://122.117.49.169:9000", "note": ""}, {"name": "芳崗高鐵樓", "url": "http://125.227.227.47:9000", "note": ""}, {"name": "荷必館", "url": "http://211.75.228.156:9000", "note": ""}, {"name": "蔚藍海18", "url": "http://122.117.49.155:9000", "note": ""}, {"name": "赫米斯", "url": "http://122.117.49.133:9000", "note": ""}, {"name": "輕軌線上", "url": "http://60.249.137.193:9000", "note": ""}, {"name": "達麗宮廷", "url": "http://122.117.213.79:9000", "note": ""}, {"name": "陽光新未來", "url": "http://114.33.57.152:9000", "note": ""}, {"name": "飛揚大樓", "url": "http://220.133.182.97:9000", "note": ""}, {"name": "鳳凰時代", "url": "http://122.117.49.250:9000", "note": ""}, {"name": "興連城PRO+", "url": "http://220.133.21.209:9000", "note": ""}];
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const col = collection(db, "buildings");

let buildings = [];
let currentId = null;
let timer = null;
let remoteUpdate = false;

const $ = id => document.getElementById(id);
function idFor(name) { return encodeURIComponent(name.trim()).replaceAll("%","_"); }
function esc(s) { return String(s ?? "").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m])); }
function val(id) { return $(id).value.trim(); }
function setVal(id, v) { $(id).value = v || ""; }
function getCurrent() { return buildings.find(b => b.id === currentId); }

async function seedIfEmpty() {
  if (localStorage.getItem("rb_seed_simple_done")) return;
  localStorage.setItem("rb_seed_simple_done","1");
  for (const b of DEFAULT_BUILDINGS) {
    await setDoc(doc(db, "buildings", idFor(b.name)), {
      name:b.name, url:b.url, note:b.note || "", hub:[], createdAt:serverTimestamp(), updatedAt:serverTimestamp()
    }, {merge:true});
  }
}

onSnapshot(col, async snap => {
  remoteUpdate = true;
  buildings = snap.docs.map(d => {
    const x = d.data();
    return { id:d.id, name:x.name || "", url:x.url || "", note:x.note || "", hub:Array.isArray(x.hub)?x.hub:[], updatedAt:x.updatedAt || null };
  });
  if (buildings.length === 0) {
    $("status").textContent = "第一次初始化大樓資料中...";
    try { await seedIfEmpty(); } catch(e) { console.error(e); $("status").textContent = "初始化失敗，請確認 Firestore 規則"; }
  }
  buildings.sort((a,b)=>a.name.localeCompare(b.name,"zh-Hant"));
  $("status").textContent = "✅ 雲端同步中，共 " + buildings.length + " 棟大樓";
  renderList();
  if (currentId && getCurrent()) { fillDetail(getCurrent(), false); if ($("hubPage").style.display === "block") renderHub(); }
  setTimeout(()=>remoteUpdate=false,0);
}, err => {
  console.error(err);
  $("status").textContent = "❌ 雲端讀寫失敗：請確認 Firebase Firestore 規則";
});

function renderList() {
  const q = $("search").value.trim().toLowerCase();
  const arr = buildings.filter(b => [b.name,b.url,b.note].join(" ").toLowerCase().includes(q));
  $("list").innerHTML = arr.map(b => `
    <div class="item" data-id="${esc(b.id)}">
      <div class="name">🏢 ${esc(b.name)}</div>
      <div class="meta">${esc(b.url)}</div>
      ${b.hub?.length ? '<div class="meta">🔌 HUB：'+b.hub.length+' 組</div>' : ''}
      ${b.note ? '<div class="meta">📝 '+esc(b.note.slice(0,60))+(b.note.length>60?'...':'')+'</div>' : ''}
    </div>
  `).join("") || `<div class="empty">找不到資料</div>`;
  document.querySelectorAll(".item").forEach(el => el.onclick = () => openDetail(el.dataset.id));
}

function openDetail(id) {
  currentId = id;
  const b = getCurrent();
  if (!b) return;
  $("home").style.display = "none";
  $("hubPage").style.display = "none";
  $("detail").style.display = "block";
  fillDetail(b, true);
  window.scrollTo(0,0);
}

function fillDetail(b, overwrite=true) {
  if (!overwrite && document.activeElement && ["INPUT","TEXTAREA"].includes(document.activeElement.tagName)) return;
  $("dTitle").textContent = b.name;
  $("dUrl").textContent = b.url;
  setVal("fName", b.name);
  setVal("fUrl", b.url);
  $("fNote").value = b.note || "";
  $("rbBtn").href = b.url || "#";
  $("lastUpdate").textContent = b.updatedAt?.toDate ? "最後更新：" + b.updatedAt.toDate().toLocaleString("zh-TW") : "";
}

async function saveCurrent(manual=false) {
  if (!currentId || remoteUpdate) return;
  const old = getCurrent();
  const name = val("fName");
  const url = val("fUrl");
  if (!name || !url) return;
  const newId = idFor(name);
  $("saveState").textContent = "同步中...";
  try {
    await setDoc(doc(db,"buildings",newId), {
      name, url, note:$("fNote").value, hub:old?.hub || [], updatedAt:serverTimestamp()
    }, {merge:true});
    currentId = newId;
    $("saveState").textContent = manual ? "✅ 已儲存" : "✅ 已自動同步";
  } catch(e) {
    console.error(e);
    $("saveState").textContent = "❌ 同步失敗，請確認 Firestore 規則";
  }
}

["fName","fUrl","fNote"].forEach(id => {
  $(id).addEventListener("input", () => {
    clearTimeout(timer);
    $("saveState").textContent = "準備同步...";
    timer = setTimeout(() => saveCurrent(false), 700);
  });
});

$("saveBtn").onclick = () => saveCurrent(true);
$("back").onclick = () => {
  $("detail").style.display = "none";
  $("home").style.display = "block";
  currentId = null;
  renderList();
  window.scrollTo(0,0);
};
$("search").addEventListener("input", renderList);

$("addBtn").onclick = () => {
  setVal("mName","");
  setVal("mUrl","");
  $("modal").style.display = "flex";
  $("mName").focus();
};
$("modalCancel").onclick = () => $("modal").style.display = "none";
$("modalSave").onclick = async () => {
  const name = val("mName");
  const url = val("mUrl");
  if (!name || !url) return alert("名稱和網址都要填");
  const id = idFor(name);
  await setDoc(doc(db,"buildings",id), {
    name, url, note:"", hub:[], createdAt:serverTimestamp(), updatedAt:serverTimestamp()
  }, {merge:true});
  $("modal").style.display = "none";
  openDetail(id);
};


$("hubBtn").onclick = () => {
  const b = getCurrent(); if (!b) return;
  $("detail").style.display = "none";
  $("hubPage").style.display = "block";
  $("hubTitle").textContent = b.name + " HUB";
  renderHub();
  window.scrollTo(0,0);
};

$("hubBack").onclick = () => {
  $("hubPage").style.display = "none";
  $("detail").style.display = "block";
  window.scrollTo(0,0);
};

async function saveHub(hub) {
  const b = getCurrent(); if (!b) return;
  await setDoc(doc(db,"buildings",b.id), { hub, updatedAt:serverTimestamp() }, {merge:true});
  $("hubSaveState").textContent = "✅ HUB 已同步";
}

$("addHubBtn").onclick = async () => {
  const b = getCurrent(); if (!b) return;
  const block = val("hBlock") || "A棟";
  const location = val("hLocation");
  const count = Math.max(1, Math.min(48, parseInt(val("hCount") || "4", 10)));
  if (!location) return alert("請輸入號碼/樓層，例如：33號7F");
  const ports = Array.from({length:count}, (_,i)=>({no:String(i+1), text:"", status:"empty"}));
  const hub = [...(b.hub || []), {id:Date.now().toString(), block, location, ports}];
  await saveHub(hub);
  setVal("hLocation","");
  renderHub();
};

function renderHub() {
  const b = getCurrent(); if (!b) return;
  const hub = b.hub || [];
  $("hubList").innerHTML = hub.map((h, hi) => `
    <div class="hubCard">
      <div class="hubTitle">${esc(h.block)}　${esc(h.location)}</div>
      <div class="ports">
        ${(h.ports||[]).map((p, pi)=>`<button class="port ${p.status||''}" data-hi="${hi}" data-pi="${pi}">${esc(p.no)}</button>`).join("")}
      </div>
      <div class="meta">${(h.ports||[]).filter(p=>p.text).map(p=>p.no+'：'+p.text).join('　')}</div>
      <div class="actions" style="margin-top:12px">
        <button class="btn" data-edit="${hi}">修改標題</button>
        <button class="btn" data-del="${hi}">刪除這組</button>
      </div>
    </div>
  `).join("") || `<div class="empty">尚無 HUB，先新增一組，例如 A棟 / 33號7F / 4孔</div>`;

  document.querySelectorAll(".port").forEach(btn => btn.onclick = async () => {
    const b = getCurrent();
    const hub = JSON.parse(JSON.stringify(b.hub || []));
    const h = hub[btn.dataset.hi];
    const p = h.ports[btn.dataset.pi];
    const text = prompt("孔位 " + p.no + " 用途/備註：", p.text || "");
    if (text === null) return;
    p.text = text;
    const status = prompt("狀態：empty 空孔 / used 使用 / bad 故障 / backup 備用", p.status || "empty");
    p.status = ["empty","used","bad","backup"].includes(status) ? status : "empty";
    await saveHub(hub);
    renderHub();
  });

  document.querySelectorAll("[data-edit]").forEach(btn => btn.onclick = async () => {
    const b = getCurrent();
    const hub = JSON.parse(JSON.stringify(b.hub || []));
    const h = hub[btn.dataset.edit];
    const block = prompt("棟別：", h.block || "A棟"); if (block === null) return;
    const location = prompt("號碼/樓層：", h.location || "33號7F"); if (location === null) return;
    h.block = block; h.location = location;
    await saveHub(hub);
    renderHub();
  });

  document.querySelectorAll("[data-del]").forEach(btn => btn.onclick = async () => {
    const b = getCurrent();
    const hub = JSON.parse(JSON.stringify(b.hub || []));
    const h = hub[btn.dataset.del];
    if (!confirm("刪除 " + h.block + " " + h.location + "？")) return;
    hub.splice(Number(btn.dataset.del), 1);
    await saveHub(hub);
    renderHub();
  });
}

</script>
</body>
</html>
