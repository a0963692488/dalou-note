<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>大樓快捷</title>
<style>
  :root{--bg:#f5f5f7;--card:#fff;--text:#111827;--muted:#6b7280;--line:#e5e7eb;--blue:#007aff;--green:#34c759;}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC',Arial,sans-serif;background:var(--bg);color:var(--text)}
  .app{max-width:720px;margin:0 auto;min-height:100vh;padding:18px 14px 30px}
  .top{position:sticky;top:0;background:rgba(245,245,247,.92);backdrop-filter:blur(14px);z-index:5;padding:12px 0 10px}
  h1{font-size:30px;margin:8px 4px 14px}
  .search{width:100%;border:0;border-radius:16px;background:#e9e9ee;padding:14px 16px;font-size:17px;outline:none}
  .count{font-size:13px;color:var(--muted);margin:10px 6px 0}
  .list{display:grid;gap:10px;margin-top:12px}
  .card{width:100%;border:0;border-radius:18px;background:var(--card);padding:16px 16px;text-align:left;box-shadow:0 1px 2px rgba(0,0,0,.06);display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:18px;color:var(--text)}
  .card small{display:block;color:var(--muted);font-size:12px;margin-top:3px}
  .arrow{color:#9ca3af;font-size:24px}
  .detail{display:none}
  .back{border:0;background:transparent;color:var(--blue);font-size:17px;padding:8px 2px;margin:0 0 8px}
  .detailTitle{font-size:30px;font-weight:800;margin:8px 4px 6px}
  .url{font-size:13px;color:var(--muted);margin:0 4px 16px;word-break:break-all}
  .noteBox{background:var(--card);border-radius:20px;padding:14px;box-shadow:0 1px 2px rgba(0,0,0,.06)}
  label{display:block;font-size:15px;color:var(--muted);margin:0 0 8px}
  textarea{width:100%;min-height:260px;border:1px solid var(--line);border-radius:16px;padding:14px;font-size:17px;line-height:1.45;resize:vertical;outline:none;font-family:inherit;background:#fff;color:var(--text)}
  .saveState{font-size:13px;color:var(--green);margin:10px 2px 0;min-height:18px}
  .openBtn{display:block;width:100%;border:0;border-radius:18px;background:var(--blue);color:white;text-align:center;text-decoration:none;font-weight:700;font-size:20px;padding:16px;margin-top:16px}
  .copyBtn{display:block;width:100%;border:0;border-radius:18px;background:#e9e9ee;color:#111827;text-align:center;font-weight:700;font-size:17px;padding:14px;margin-top:10px}
  @media (prefers-color-scheme: dark){:root{--bg:#000;--card:#1c1c1e;--text:#f5f5f7;--muted:#a1a1aa;--line:#3a3a3c}.top{background:rgba(0,0,0,.86)}.search,.copyBtn{background:#1c1c1e;color:var(--text)}textarea{background:#111;color:var(--text);border-color:#333}}
</style>
</head>
<body>
<div class="app">
  <section id="home">
    <div class="top">
      <h1>🏢 大樓快捷</h1>
      <input id="search" class="search" placeholder="搜尋大樓名稱..." autocomplete="off" />
      <div id="count" class="count"></div>
    </div>
    <div id="list" class="list"></div>
  </section>
  <section id="detail" class="detail">
    <button class="back" onclick="goHome()">‹ 返回大樓列表</button>
    <div class="detailTitle" id="detailTitle"></div>
    <div class="url" id="detailUrl"></div>
    <div class="noteBox">
      <label for="note">備註，可以隨時修改，會自動儲存在這支手機/這台電腦</label>
      <textarea id="note" placeholder="在這裡輸入備註，例如：帳號、注意事項、設備位置、登入提醒..."></textarea>
      <div id="saveState" class="saveState"></div>
    </div>
    <a id="openRb" class="openBtn" target="_blank" rel="noopener">進入 RB</a>
    <button id="copyUrl" class="copyBtn">複製網址</button>
  </section>
</div>
<script>

const listEl=document.getElementById('list'), searchEl=document.getElementById('search'), countEl=document.getElementById('count');
const home=document.getElementById('home'), detail=document.getElementById('detail'), note=document.getElementById('note'), saveState=document.getElementById('saveState');
let current=null, timer=null;
function noteKey(b){ return 'note:'+b.name+'|'+b.url; }
function render(){
  const q=searchEl.value.trim().toLowerCase();
  const data=buildings.filter(b=>b.name.toLowerCase().includes(q));
  countEl.textContent = `共 ${data.length} 筆`;
  listEl.innerHTML='';
  data.forEach(b=>{
    const btn=document.createElement('button'); btn.className='card';
    const saved=localStorage.getItem(noteKey(b));
    btn.innerHTML=`<div><b>🏢 ${b.name}</b>${saved?'<small>已有備註</small>':''}</div><span class="arrow">›</span>`;
    btn.onclick=()=>openDetail(b); listEl.appendChild(btn);
  });
}
function openDetail(b){
  current=b; home.style.display='none'; detail.style.display='block';
  document.getElementById('detailTitle').textContent='🏢 '+b.name;
  document.getElementById('detailUrl').textContent=b.url;
  document.getElementById('openRb').href=b.url;
  note.value=localStorage.getItem(noteKey(b))||'';
  saveState.textContent=''; window.scrollTo(0,0);
}
function goHome(){ detail.style.display='none'; home.style.display='block'; render(); window.scrollTo(0,0); }
note.addEventListener('input',()=>{ if(!current)return; localStorage.setItem(noteKey(current), note.value); saveState.textContent='已自動儲存'; clearTimeout(timer); timer=setTimeout(()=>saveState.textContent='',1500); });
document.getElementById('copyUrl').onclick=async()=>{ if(!current)return; try{await navigator.clipboard.writeText(current.url); saveState.textContent='網址已複製';}catch(e){saveState.textContent=current.url;} };
searchEl.addEventListener('input',render); render();
</script>
</body>
</html>
