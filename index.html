<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>RB 大樓雲端筆記</title>
<style>
:root {
  --bg:#050507; --panel:#111114; --card:#1c1c1f; --card2:#242428; --text:#f5f5f7;
  --muted:#a1a1aa; --line:#33333a; --blue:#0a84ff; --green:#34c759; --red:#ff453a; --yellow:#ffd60a;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",Arial,sans-serif}
button,input,textarea{font-family:inherit}
.app{max-width:1050px;margin:0 auto;padding:18px 14px 46px}
.top{position:sticky;top:0;z-index:10;background:linear-gradient(180deg,var(--bg) 88%,rgba(5,5,7,0));padding:12px 0 16px}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
h1{font-size:30px;margin:0 0 12px;font-weight:950}
.search{flex:1;min-width:220px;padding:15px 16px;border-radius:16px;border:1px solid var(--line);background:var(--card);color:var(--text);font-size:17px;outline:none}
.btn{border:0;border-radius:15px;min-height:48px;padding:0 16px;font-size:16px;font-weight:850;cursor:pointer;color:white;background:var(--card2)}
.btn.blue{background:var(--blue)} .btn.green{background:var(--green)} .btn.red{background:var(--red)} .btn.yellow{background:#6b5600;color:#fff}
.status{color:var(--muted);font-size:13px;margin-top:8px}
.tabs{display:flex;gap:8px;overflow:auto;padding:2px 0 10px;margin-top:10px}
.tab{white-space:nowrap;border:1px solid var(--line);background:var(--card);color:var(--text);border-radius:999px;padding:9px 13px;cursor:pointer}
.tab.active{background:var(--blue);border-color:var(--blue);color:white}
.list{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px;margin-top:8px}
.item{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:16px;cursor:pointer;min-height:118px}
.item:hover{border-color:#666}
.itemHead{display:flex;justify-content:space-between;gap:8px}
.name{font-size:21px;font-weight:950} .fav{color:var(--yellow);font-size:20px}
.meta{font-size:13px;color:var(--muted);margin-top:6px;word-break:break-all}
.badge{display:inline-block;margin-top:10px;color:#d1d5db;border:1px solid #3f3f46;border-radius:999px;padding:4px 9px;font-size:12px}
.detail{display:none}
.back{display:inline-block;color:var(--blue);font-size:18px;text-decoration:none;margin:6px 0 18px;cursor:pointer}
.hero{display:flex;align-items:center;gap:14px;margin-bottom:10px}
.icon{font-size:42px} h2{font-size:34px;margin:0;font-weight:950}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:16px;margin-top:12px}
label{display:block;color:#d4d4d8;font-size:14px;font-weight:800;margin:0 0 7px}
.field{width:100%;padding:13px 14px;border-radius:14px;border:1px solid #3a3a42;background:#111113;color:var(--text);font-size:16px;outline:none}
textarea.field{min-height:230px;resize:vertical;line-height:1.55}
.actions{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:12px}
.full{grid-column:1/-1}
.small{font-size:13px;color:var(--muted);margin-top:8px;min-height:18px}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:99;align-items:flex-end;justify-content:center;padding:14px}
.modalBox{width:min(720px,100%);max-height:88vh;overflow:auto;background:var(--panel);border:1px solid var(--line);border-radius:24px;padding:16px}
.modalTitle{font-size:24px;font-weight:950;margin:0 0 12px}
.empty{text-align:center;color:var(--muted);padding:42px}
hr{border:0;border-top:1px solid var(--line);margin:14px 0}
@media(max-width:720px){.grid{grid-template-columns:1fr}.actions{grid-template-columns:1fr 1fr}h2{font-size:30px}.list{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
  <section id="home">
    <div class="top">
      <h1>🏢 RB 大樓雲端筆記</h1>
      <div class="row">
        <input id="search" class="search" placeholder="搜尋大樓、網址、分類、備註..." />
        <button class="btn blue" id="addBtn">＋新增</button>
        <button class="btn" id="exportBtn">備份</button>
        <button class="btn" id="importBtn">還原</button>
      </div>
      <div id="status" class="status">雲端連線中...</div>
      <div class="tabs" id="tabs"></div>
    </div>
    <div id="list" class="list"></div>
  </section>

  <section id="detail" class="detail">
    <a id="back" class="back">‹ 返回大樓列表</a>
    <div class="hero"><div class="icon">🏢</div><h2 id="dTitle"></h2></div>
    <div id="dUrl" class="meta"></div>
    <div class="card">
      <div class="grid">
        <div><label>大樓名稱</label><input id="fName" class="field"></div>
        <div><label>分類</label><input id="fCategory" class="field" placeholder="例如：Happy、社宅、一般"></div>
        <div class="full"><label>RB 網址</label><input id="fUrl" class="field"></div>
        <div><label>帳號</label><input id="fAccount" class="field"></div>
        <div><label>密碼</label><input id="fPassword" class="field" type="password"></div>
        <div><label>地址 / 位置</label><input id="fAddress" class="field"></div>
        <div><label>聯絡人</label><input id="fContact" class="field"></div>
        <div><label>電話</label><input id="fPhone" class="field"></div>
        <div class="full"><label>備註</label><textarea id="fNote" class="field" placeholder="輸入注意事項、設備位置、登入提醒、處理紀錄..."></textarea></div>
      </div>
      <div class="actions">
        <button class="btn yellow" id="favBtn">☆ 收藏</button>
        <button class="btn" id="showPassBtn">顯示密碼</button>
        <button class="btn" id="copyBtn">複製資料</button>
        <a class="btn blue" id="rbBtn" target="_blank" rel="noopener" style="text-decoration:none;display:flex;align-items:center;justify-content:center">進入 RB</a>
        <button class="btn green" id="saveBtn">立即儲存</button>
        <button class="btn red" id="deleteBtn">刪除大樓</button>
      </div>
      <div id="saveState" class="small"></div>
      <div id="lastUpdate" class="small"></div>
    </div>
  </section>
</div>

<div id="modal" class="modal">
  <div class="modalBox">
    <h3 class="modalTitle" id="modalTitle">新增大樓</h3>
    <div class="grid">
      <div><label>大樓名稱</label><input id="mName" class="field"></div>
      <div><label>分類</label><input id="mCategory" class="field" value="一般"></div>
      <div class="full"><label>RB 網址</label><input id="mUrl" class="field" placeholder="http://...:9000"></div>
    </div>
    <div class="actions">
      <button class="btn blue" id="modalSave">新增</button>
      <button class="btn" id="modalCancel">取消</button>
    </div>
  </div>
</div>

<input type="file" id="fileInput" accept="application/json" style="display:none">

const app = initializeApp(firebaseConfig);

let buildings = [];
let currentId = null;

let timer = null;
let remoteUpdate = false;
const $ = id => document.getElementById(id);

function idFor(name) { return encodeURIComponent(name.trim()).replaceAll("%","_"); }
function val(id) { return $(id).value.trim(); }
function setVal(id,v) { $(id).value = v || ""; }
function esc(s) { return String(s ?? "").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m])); }
function getCurrent() { return buildings.find(b => b.id === currentId); }

function normalize(id, d) {
  return {
    id,
    name: d.name || "",
    url: d.url || "",
    category: d.category || "一般",
    note: d.note || "",
    address: d.address || "",
    account: d.account || "",
    password: d.password || "",
    contact: d.contact || "",
    phone: d.phone || "",
    favorite: !!d.favorite,
    lastUsed: d.lastUsed || 0,
    updatedAt: d.updatedAt || null
  };
}

async function seedIfEmpty() {
  if (localStorage.getItem("rb_seed_done_v2")) return;
  localStorage.setItem("rb_seed_done_v2","1");
  for (const b of DEFAULT_BUILDINGS) {
    await setDoc(doc(db, "buildings", idFor(b.name)), {...b, createdAt: serverTimestamp(), updatedAt: serverTimestamp()}, {merge:true});
  }
}

onSnapshot(col, async snap => {
  remoteUpdate = true;
  buildings = snap.docs.map(d => normalize(d.id, d.data()));
  if (buildings.length === 0) {
    $("status").textContent = "第一次初始化大樓資料中...";
    try { await seedIfEmpty(); } catch(e) { console.error(e); $("status").textContent = "初始化失敗，請確認 Firestore 規則"; }
  }
  buildings.sort((a,b)=>(b.favorite-a.favorite) || (b.lastUsed||0)-(a.lastUsed||0) || a.name.localeCompare(b.name,"zh-Hant"));
  $("status").textContent = "✅ 雲端同步中，共 " + buildings.length + " 棟大樓";
  renderTabs(); renderList();
  if (currentId && getCurrent()) fillDetail(getCurrent(), false);
  setTimeout(()=>remoteUpdate=false,0);
}, err => {
  console.error(err);
  $("status").textContent = "❌ 雲端讀寫失敗：請確認 Firebase Firestore 規則";
});

function renderTabs() {
  const cats = ["全部","收藏",...Array.from(new Set(buildings.map(b=>b.category||"一般")))];
  $("tabs").innerHTML = cats.map(c => `<button class="tab ${c===currentTab?'active':''}" data-tab="${esc(c)}">${esc(c)}</button>`).join("");
  document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{currentTab=t.dataset.tab; renderTabs(); renderList();});
}

function renderList() {
  const q = $("search").value.trim().toLowerCase();
  let arr = buildings.filter(b => {
    const text = [b.name,b.url,b.category,b.note,b.address,b.account,b.contact,b.phone].join(" ").toLowerCase();
    const tabOk = currentTab === "全部" || (currentTab === "收藏" ? b.favorite : b.category === currentTab);
    return tabOk && text.includes(q);
  });
  $("list").innerHTML = arr.map(b => `
    <div class="item" data-id="${esc(b.id)}">
      <div class="itemHead"><div class="name">🏢 ${esc(b.name)}</div><div class="fav">${b.favorite?'★':''}</div></div>
      <div class="meta">${esc(b.url)}</div>
      <span class="badge">${esc(b.category || '一般')}</span>
      ${b.note ? '<div class="meta">📝 '+esc(b.note.slice(0,45))+(b.note.length>45?'...':'')+'</div>' : ''}
    </div>
  `).join("") || `<div class="empty">找不到資料</div>`;
  document.querySelectorAll(".item").forEach(el=>el.onclick=()=>openDetail(el.dataset.id));
}

function openDetail(id) {
  currentId = id;
  const b = getCurrent();
  if (!b) return;
  $("home").style.display = "none";
  $("detail").style.display = "block";
  fillDetail(b, true);
  setDoc(doc(db,"buildings",id), {lastUsed: Date.now()}, {merge:true});
  window.scrollTo(0,0);
}

function fillDetail(b, overwrite=true) {
  if (!overwrite && document.activeElement && ["INPUT","TEXTAREA"].includes(document.activeElement.tagName)) return;
  $("dTitle").textContent = b.name;
  $("dUrl").textContent = b.url;
  setVal("fName", b.name); setVal("fCategory", b.category); setVal("fUrl", b.url);
  setVal("fAccount", b.account); setVal("fPassword", b.password); setVal("fAddress", b.address);
  setVal("fContact", b.contact); setVal("fPhone", b.phone); setVal("fNote", b.note);
  $("rbBtn").href = b.url || "#";
  $("favBtn").textContent = b.favorite ? "★ 已收藏" : "☆ 收藏";
  $("lastUpdate").textContent = b.updatedAt?.toDate ? "最後更新：" + b.updatedAt.toDate().toLocaleString("zh-TW") : "";
}

async function saveCurrent(manual=false) {
  if (!currentId || remoteUpdate) return;
  const old = getCurrent();
  const name = val("fName");
  if (!name) return alert("大樓名稱不能空白");
  const newId = idFor(name);
  const data = {
    name, category: val("fCategory") || "一般", url: val("fUrl"),
    account: val("fAccount"), password: val("fPassword"), address: val("fAddress"),
    contact: val("fContact"), phone: val("fPhone"), note: $("fNote").value,
    favorite: old?.favorite || false, updatedAt: serverTimestamp()
  };
  $("saveState").textContent = "同步中...";
  try {
    await setDoc(doc(db,"buildings",newId), data, {merge:true});
    if (newId !== currentId) await deleteDoc(doc(db,"buildings",currentId));
    currentId = newId;
    $("saveState").textContent = manual ? "✅ 已儲存" : "✅ 已自動同步";
  } catch(e) {
    console.error(e); $("saveState").textContent = "❌ 同步失敗，請確認 Firestore 規則";
  }
}

["fName","fCategory","fUrl","fAccount","fPassword","fAddress","fContact","fPhone","fNote"].forEach(id=>{
  $(id).addEventListener("input",()=>{ clearTimeout(timer); $("saveState").textContent="準備同步..."; timer=setTimeout(()=>saveCurrent(false),700); });
});

$("saveBtn").onclick = () => saveCurrent(true);
$("back").onclick = () => { $("detail").style.display="none"; $("home").style.display="block"; currentId=null; renderList(); window.scrollTo(0,0); };
$("search").addEventListener("input", renderList);

$("favBtn").onclick = async () => {
  const b = getCurrent(); if(!b) return;
  await setDoc(doc(db,"buildings",b.id), {favorite: !b.favorite, updatedAt: serverTimestamp()}, {merge:true});
};

$("showPassBtn").onclick = () => {
  $("fPassword").type = $("fPassword").type === "password" ? "text" : "password";
  $("showPassBtn").textContent = $("fPassword").type === "password" ? "顯示密碼" : "隱藏密碼";
};

$("copyBtn").onclick = async () => {
  const b = getCurrent(); if(!b) return;
  const text = `大樓：${val("fName")}\nRB：${val("fUrl")}\n帳號：${val("fAccount")}\n密碼：${val("fPassword")}\n地址：${val("fAddress")}\n聯絡人：${val("fContact")}\n電話：${val("fPhone")}\n備註：\n${$("fNote").value}`;
  await navigator.clipboard.writeText(text);
  $("saveState").textContent = "✅ 已複製資料";
};

$("deleteBtn").onclick = async () => {
  const b=getCurrent(); if(!b) return;
  if(confirm("確定刪除「"+b.name+"」？")) {
    await deleteDoc(doc(db,"buildings",b.id));
    $("back").click();
  }
};

$("addBtn").onclick = () => {
  setVal("mName",""); setVal("mCategory","一般"); setVal("mUrl","");
  $("modal").style.display="flex"; $("mName").focus();
};
$("modalCancel").onclick = () => $("modal").style.display="none";
$("modalSave").onclick = async () => {
  const name = val("mName"), url = val("mUrl"); if(!name || !url) return alert("名稱和網址都要填");
  const id = idFor(name);
  await setDoc(doc(db,"buildings",id), {name, url, category: val("mCategory") || "一般", note:"", address:"", account:"", password:"", contact:"", phone:"", favorite:false, createdAt: serverTimestamp(), updatedAt: serverTimestamp()}, {merge:true});
  $("modal").style.display="none";
};

$("exportBtn").onclick = () => {
  const blob = new Blob([JSON.stringify(buildings, null, 2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "rb-buildings-backup.json";
  a.click();
};

$("importBtn").onclick = () => $("fileInput").click();
$("fileInput").onchange = async e => {
  const file = e.target.files[0]; if(!file) return;
  const data = JSON.parse(await file.text());
  if(!Array.isArray(data)) return alert("備份格式不對");
  if(!confirm("確定匯入？同名大樓會覆蓋。")) return;
  for (const b of data) {
    if(!b.name) continue;
    await setDoc(doc(db,"buildings",idFor(b.name)), {...b, updatedAt: serverTimestamp()}, {merge:true});
  }
  alert("匯入完成");
};
</script>
</body>
</html>
